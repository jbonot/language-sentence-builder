services:
  db:
    image: postgres:16-alpine
    container_name: language_app_db
    restart: always
    environment:
      POSTGRES_DB: language_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
